seed: 42

languages:
  - en
  - ko

sampling:
  target_total_per_language:
    en: 10000
    ko: 10000
  split_ratios:
    train: 0.8
    valid: 0.1
    test: 0.1

format:
  add_language_tag: false
  sep_token: "<SEP>"
  sos_token: "<SOS>"
  eos_token: "<EOS>"

filters:
  min_input_chars: 20
  min_target_chars: 20
  max_input_chars: 600
  max_target_chars: 600
  max_encoder_tokens: 120
  max_decoder_tokens: 120
  reject_same_input_target: true
  deduplicate_by_normalized_text: true

sources:
  en:
    ibm_argq_30k:
      enabled: true
      kind: stance_pair
      hf_name: ibm-research/argument_quality_ranking_30k
      max_records: 6000
    mc_conversation:
      enabled: true
      kind: direct_dialogue
      hf_name: mc-ai/conversation_dataset
      max_records: 1500
    isotonic_conversation:
      enabled: true
      kind: direct_dialogue
      hf_name: Isotonic/human_assistant_conversation
      max_records: 1500
      topic_override: "casual conversation"
    casual_conversation:
      enabled: true
      kind: direct_dialogue
      hf_name: SohamGhadge/casual-conversation
      max_records: 1000
      topic_override: "casual conversation"
    cmv_convokit:
      enabled: false        # plan §6 — wire after baseline
      kind: direct_dialogue
      path: null
    args_me:
      enabled: false
      kind: stance_pair
      hf_name: webis/args_me
    perspectrum:
      enabled: false
      kind: perspective_pair
      path: null
    debatesum:
      enabled: false
      kind: evidence_summary
      hf_name: Hellisotherpeople/DebateSum
    aae2:
      enabled: false
      kind: argument_relation
      hf_name: pie/aae2
    schopenhauer_debate:
      enabled: false        # too small; consider as few-shot in synth prompt v2
      kind: style_reference
      hf_name: raphaaal/schopenhauer-debate

  ko:
    klue_nli:
      enabled: true              # no vLLM needed — direct contradiction pairs
      kind: nli_contradiction_pair
      hf_name: klue/klue
      hf_config: nli
      max_records: 5000
    korean_petitions:
      enabled: true
      kind: issue_to_synthetic_rebuttal
      korpora_name: korean_petitions
      max_records: 10000
      requires: vllm
    k_news_stance:
      enabled: true              # adapter present, gated on manual data
      kind: stance_pair
      path: data/raw_manual/k-news-stance/k-news-stance.json
    aihub_dialogue_summary:
      enabled: true              # adapter present, gated on manual data
      kind: direct_dialogue_or_synthetic
      path: data/raw_manual/aihub/dialogue_summary/
    aihub_topic_dialogue:
      enabled: true              # adapter present, gated on manual data
      kind: direct_dialogue
      path: data/raw_manual/aihub/topic_dialogue/
    aihub_meeting_speech:
      enabled: false
      kind: transcript_dialogue
      path: data/raw_manual/aihub/meeting_speech/
    aihub_korean_dialogue:
      enabled: false
      kind: auxiliary_dialogue
      path: data/raw_manual/aihub/korean_dialogue/
